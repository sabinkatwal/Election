<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election — PR Vote Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Nepali&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f0e17;
    --surface:  #1a1828;
    --surface2: #211e32;
    --border:   rgba(255,255,255,0.07);
    --text:     #fffffe;
    --muted:    #a7a9be;
    --accent:   #ff8906;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,137,6,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(14,165,233,0.05) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease both;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }
  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .divider { width: 60px; height: 2px; background: var(--accent); margin: 14px auto; border-radius: 2px; }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 22px;
    animation: fadeUp 0.8s ease 0.05s both;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .dot-live {
    width: 7px; height: 7px; border-radius: 50%;
    background: #06d6a0;
    box-shadow: 0 0 0 0 rgba(6,214,160,0.4);
    animation: livePulse 2s infinite;
    flex-shrink: 0;
  }
  .dot-live.loading { background: var(--accent); animation: blink 0.9s infinite; box-shadow: none; }
  .dot-live.error   { background: #e53170; animation: none; box-shadow: none; }

  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 rgba(6,214,160,0.4); }
    70%  { box-shadow: 0 0 0 7px rgba(6,214,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(6,214,160,0); }
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .countdown-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .countdown-pill span { color: var(--accent); font-weight: 600; }

  /* ── ERROR BANNER ── */
  .error-banner {
    display: none;
    width: 100%;
    max-width: 820px;
    background: rgba(229,49,112,0.08);
    border: 1px solid rgba(229,49,112,0.2);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.75rem;
    color: #e53170;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 820px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.85s ease 0.1s both;
  }

  .stat-card {
    flex: 1 1 150px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }

  .stat-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.55rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 0.67rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ── SLIDER CONTROL ── */
  .control {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.9s ease 0.15s both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  .control label {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .slider-wrap { display: flex; align-items: center; gap: 12px; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,50%), rgba(255,255,255,0.12) var(--pct,50%), rgba(255,255,255,0.12) 100%);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,137,6,0.25);
    transition: box-shadow 0.2s;
  }
  input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 6px rgba(255,137,6,0.2); }

  .count-badge {
    background: var(--accent);
    color: #0f0e17;
    font-weight: 700;
    font-size: 1rem;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    flex-shrink: 0;
  }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    max-width: 900px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.9s ease 0.2s both;
  }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    flex: 0 0 320px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }

  .chart-subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  /* ── LEGEND ── */
  .legend {
    flex: 1 1 260px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 4px;
    flex-direction: column;
  }

  .legend::-webkit-scrollbar { width: 4px; }
  .legend::-webkit-scrollbar-track { background: transparent; }
  .legend::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .legend-section-title {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .legend-section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid transparent;
  }

  .legend-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
  .legend-item.active { background: rgba(255,137,6,0.08); border-color: rgba(255,137,6,0.2); }

  .dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

  .legend-info { flex: 1; min-width: 0; }

  .legend-name {
    font-size: 0.78rem;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
    font-family: 'Tiro Devanagari Nepali', serif;
  }

  .legend-rank {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    color: #0f0e17;
    background: var(--accent);
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 5px;
    font-weight: 700;
    vertical-align: middle;
  }

  .legend-meta { display: flex; gap: 10px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
  .legend-votes { font-size: 0.7rem; color: var(--muted); font-weight: 300; }
  .legend-pct   { font-size: 0.7rem; font-weight: 600; color: var(--accent); }
  .legend-seats {
    font-size: 0.62rem;
    color: var(--muted);
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: auto;
  }
  .legend-seats b { color: var(--text); }

  .bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  /* ── SKELETON ── */
  .skeleton-list {
    flex: 1 1 260px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .skeleton-row {
    height: 62px;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 620px) {
    .chart-container { flex: 0 0 100%; padding: 18px; }
    .legend { max-height: 320px; }
    input[type=range] { width: 120px; }
    .stats-row { gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>नेपाल — <span>समानुपातिक मत वितरण</span></h1>
  <div class="divider"></div>
  <p>PR Vote Distribution · Live · election.onlinekhabar.com</p>
</header>

<div class="status-bar">
  <div class="status-pill">
    <div class="dot-live loading" id="liveDot"></div>
    <span id="statusLabel">Connecting…</span>
  </div>
  <button class="btn-refresh" onclick="doRefresh()">↻ Refresh</button>
  <div class="countdown-pill">Auto-refresh in <span id="countdown">60</span>s</div>
  <div class="status-pill">🕐 <span id="lastUpdated" style="color:var(--text);margin-left:2px;">—</span></div>
</div>

<div class="error-banner" id="errorBanner">
  ⚠ Live data unavailable — showing last successful data. Will retry automatically.
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-val" id="st-votes">—</div>
    <div class="stat-lbl">Total PR Votes</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="st-parties">—</div>
    <div class="stat-lbl">Parties</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="st-seats">—</div>
    <div class="stat-lbl">Seats Won</div>
  </div>
  <div class="stat-card" style="flex:2 1 220px;">
    <div class="stat-val" id="st-leader" style="font-size:0.9rem;font-family:'Tiro Devanagari Nepali',serif;">—</div>
    <div class="stat-lbl">Leading Party</div>
  </div>
</div>

<div class="control">
  <label>Show Top Parties</label>
  <div class="slider-wrap">
    <span style="font-size:0.76rem;color:var(--muted)">1</span>
    <input type="range" id="topSlider" min="1" max="15" value="8" step="1" oninput="onSlider(this.value)">
    <span style="font-size:0.76rem;color:var(--muted)" id="sliderMax">15</span>
  </div>
  <div class="count-badge" id="countBadge">8</div>
</div>

<div class="layout">
  <div class="chart-container">
    <div class="chart-subtitle">समानुपातिक मत</div>
    <canvas id="pie" width="264" height="264"></canvas>
  </div>

  <div class="skeleton-list" id="skeletonList">
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
    <div class="skeleton-row"></div>
  </div>

  <div class="legend" id="legend" style="display:none;"></div>
</div>

<script>
const TARGET = 'https://election.onlinekhabar.com/parties';
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
const AUTO_SEC = 60;
const PALETTE = [
  "#ff8906","#3a86ff","#06d6a0","#e53170","#ffd166",
  "#8338ec","#f25f4c","#118ab2","#7b2d8b","#ef476f",
  "#fb5607","#3d9970","#ff006e","#8ecae6","#219ebc",
  "#ffb703","#023e8a","#80b918","#e63946","#457b9d"
];

let allParties = [];
let topN = 8;
let cdSec = AUTO_SEC;
let cdTimer = null;
let activeColors = [];
let centerTimer = null;

// ── CHART ──────────────────────────────────────────────
const ctx = document.getElementById('pie').getContext('2d');
const chart = new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: [],
    datasets: [{
      data: [],
      backgroundColor: [],
      borderColor: '#0f0e17',
      borderWidth: 2,
      hoverBorderWidth: 3,
      hoverOffset: 14
    }]
  },
  options: {
    responsive: false,
    cutout: '62%',
    animation: { animateRotate: true, duration: 700, easing: 'easeInOutQuart' },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1828',
        titleColor: '#fffffe',
        bodyColor: '#a7a9be',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        padding: 12,
        titleFont: { family: "'Tiro Devanagari Nepali', serif", size: 13 },
        bodyFont:  { family: "'DM Sans', sans-serif", size: 11 },
        callbacks: {
          label(c) {
            const tot = allParties.slice(0, topN).reduce((s,p) => s+p.votes, 0);
            const pct = tot ? ((c.parsed/tot)*100).toFixed(2) : 0;
            return ` ${c.parsed.toLocaleString()} votes  (${pct}%)`;
          }
        }
      }
    }
  }
});

function drawCenter(total) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  ctx.save();
  ctx.font = `bold 17px 'DM Serif Display', serif`;
  ctx.fillStyle = '#fffffe';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(fmtNum(total), w/2, h/2 - 10);
  ctx.font = `9px 'DM Sans', sans-serif`;
  ctx.fillStyle = '#a7a9be';
  ctx.fillText('TOTAL VOTES', w/2, h/2 + 11);
  ctx.restore();
}

// ── NEPALI NUMERALS ────────────────────────────────────
function nep2arab(s) {
  return String(s||'').replace(/[०-९]/g, d => '०१२३४५६७८९'.indexOf(d));
}
function parseNum(s) {
  const n = parseInt(nep2arab(s).replace(/,/g,''), 10);
  return isNaN(n) ? 0 : n;
}

// ── SCRAPER ────────────────────────────────────────────
async function fetchHTML() {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(TARGET), { signal: AbortSignal.timeout(13000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 500) return text;
    } catch(e) { console.warn('Proxy failed:', e.message); }
  }
  throw new Error('All proxies failed');
}

function parseParties(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const parties = [];

  const selectors = [
    '.party-card','.party_card','.party-item','.party_item',
    '[class*="party-card"]','[class*="partyCard"]',
    '.result-card','.result_card','.parties-list > *','.party-list > *'
  ];

  let cards = [];
  for (const s of selectors) {
    const found = doc.querySelectorAll(s);
    if (found.length > 2) { cards = Array.from(found); break; }
  }

  if (!cards.length) {
    const seen = new Set();
    doc.querySelectorAll('*').forEach(el => {
      const t = el.textContent;
      if (el.children.length > 0 && el.children.length < 30 &&
          (t.includes('समानुपातिक') || t.includes('जित'))) {
        if (!seen.has(el)) { seen.add(el); cards.push(el); }
      }
    });
  }

  for (const card of cards) {
    const txt = card.textContent || '';
    if (!txt.includes('समानुपातिक') && !txt.includes('जित')) continue;

    let name = '';
    const h = card.querySelector('h1,h2,h3,h4,h5,strong,.party-name,.name,[class*="name"],[class*="title"]');
    if (h) name = h.textContent.trim();
    if (!name) {
      for (const child of card.childNodes) {
        if (child.nodeType === 3 && child.textContent.trim()) { name = child.textContent.trim(); break; }
      }
    }
    if (!name) name = card.firstElementChild?.textContent?.trim() || '';

    let votes = 0, wins = 0;
    card.querySelectorAll('*').forEach(el => {
      const t = el.textContent.trim();
      if (t === 'समानुपातिक मत' || t === 'समानुपातिक') {
        const sib = el.nextElementSibling || el.parentElement?.nextElementSibling;
        if (sib) votes = parseNum(sib.textContent);
      }
      if (t === 'जित') {
        const sib = el.nextElementSibling || el.parentElement?.nextElementSibling;
        if (sib) wins = parseNum(sib.textContent);
      }
    });
    if (!votes) { const m = txt.match(/समानुपातिक\s*मत[^\d०-९]*([०-९\d,]+)/); if (m) votes = parseNum(m[1]); }
    if (!wins)  { const m = txt.match(/जित[^\d०-९]*([०-९\d,]+)/); if (m) wins = parseNum(m[1]); }

    if (name && votes > 0) parties.push({ name, votes, wins });
  }

  const seen = new Set();
  return parties
    .filter(p => { if (seen.has(p.name)) return false; seen.add(p.name); return true; })
    .sort((a,b) => b.votes - a.votes);
}

// ── FORMAT ─────────────────────────────────────────────
function fmtNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  if (!allParties.length) return;

  const shown  = allParties.slice(0, topN);
  const total  = shown.reduce((s,p) => s+p.votes, 0);
  const maxV   = Math.max(...shown.map(p=>p.votes), 1);
  const colors = shown.map((_,i) => PALETTE[i % PALETTE.length]);
  activeColors = [...colors];

  // Stats
  const totalAll   = allParties.reduce((s,p) => s+p.votes, 0);
  const totalSeats = allParties.reduce((s,p) => s+p.wins, 0);
  document.getElementById('st-votes').textContent   = fmtNum(totalAll);
  document.getElementById('st-parties').textContent = allParties.length;
  document.getElementById('st-seats').textContent   = totalSeats;
  document.getElementById('st-leader').textContent  = allParties[0]?.name || '—';

  // Slider
  const slider = document.getElementById('topSlider');
  const max = Math.min(allParties.length, 20);
  slider.max = max;
  document.getElementById('sliderMax').textContent = max;
  document.getElementById('countBadge').textContent = topN;
  const pct = max > 1 ? (((topN-1)/(max-1))*100).toFixed(1) : '100';
  slider.style.setProperty('--pct', pct+'%');

  // Chart
  chart.data.labels = shown.map(p => p.name);
  chart.data.datasets[0].data  = shown.map(p => p.votes);
  chart.data.datasets[0].backgroundColor = [...colors];
  chart.update();
  if (centerTimer) clearTimeout(centerTimer);
  centerTimer = setTimeout(() => drawCenter(total), 750);

  // Legend
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = `<div class="legend-section-title">Party Rankings</div>`;

  shown.forEach((p, i) => {
    const pctStr = total > 0 ? ((p.votes/total)*100).toFixed(2) : '0.00';
    const barW   = ((p.votes/maxV)*100).toFixed(1);
    const item   = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="dot" style="background:${colors[i]}"></div>
      <div class="legend-info">
        <div class="legend-name">
          <span class="legend-rank">#${i+1}</span>${p.name}
        </div>
        <div class="legend-meta">
          <span class="legend-votes">${p.votes.toLocaleString()}</span>
          <span class="legend-pct">${pctStr}%</span>
          <span class="legend-seats">🏛 <b>${p.wins}</b> seats</span>
        </div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${barW}%;background:${colors[i]}"></div>
        </div>
      </div>`;

    item.addEventListener('mouseenter', () => {
      chart.data.datasets[0].backgroundColor = activeColors.map((c,j) => j===i ? c : c+'33');
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach((el,j) => el.classList.toggle('active', j===i));
    });
    item.addEventListener('mouseleave', () => {
      chart.data.datasets[0].backgroundColor = [...activeColors];
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
    });

    legendEl.appendChild(item);
  });

  document.getElementById('skeletonList').style.display = 'none';
  legendEl.style.display = 'flex';
}

// ── STATUS ─────────────────────────────────────────────
function setStatus(state, label) {
  const dot = document.getElementById('liveDot');
  dot.className = 'dot-live' + (state === 'ok' ? '' : ' ' + state);
  document.getElementById('statusLabel').textContent = label;
}

// ── REFRESH ────────────────────────────────────────────
async function doRefresh() {
  setStatus('loading', 'Fetching…');
  document.getElementById('errorBanner').style.display = 'none';
  try {
    const html   = await fetchHTML();
    const parsed = parseParties(html);
    if (parsed.length > 0) {
      allParties = parsed;
      if (topN > allParties.length) topN = allParties.length;
      render();
      setStatus('ok', 'Live');
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
    } else {
      throw new Error('No data parsed');
    }
  } catch(e) {
    console.error(e);
    setStatus('error', 'Unavailable');
    document.getElementById('errorBanner').style.display = 'block';
    if (!allParties.length) {
      document.getElementById('skeletonList').innerHTML = `
        <div style="padding:48px 20px;text-align:center;color:var(--muted);font-size:0.8rem;letter-spacing:0.06em;text-transform:uppercase;line-height:2;">
          Live data unavailable<br>
          <span style="font-size:0.68rem;opacity:0.5;">Check connection or refresh</span>
        </div>`;
    }
  }
  resetCountdown();
}

// ── SLIDER ─────────────────────────────────────────────
function onSlider(val) {
  topN = parseInt(val);
  render();
}

// ── COUNTDOWN ──────────────────────────────────────────
function resetCountdown() {
  cdSec = AUTO_SEC;
  document.getElementById('countdown').textContent = cdSec;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdSec--;
    document.getElementById('countdown').textContent = Math.max(0, cdSec);
    if (cdSec <= 0) { clearInterval(cdTimer); doRefresh(); }
  }, 1000);
}

doRefresh();
</script>
</body>
</html>
