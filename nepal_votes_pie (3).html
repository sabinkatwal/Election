<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Live Election Results 2082</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Nepali&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17; --surface: #1a1828; --surface2: #211e32;
    --border: rgba(255,255,255,0.07); --text: #fffffe;
    --muted: #a7a9be; --accent: #ff8906; --green: #06d6a0;
    --red: #ef476f; --blue: #3a86ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:32px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 20%,rgba(255,137,6,.06) 0%,transparent 60%),
      radial-gradient(ellipse at 80% 80%,rgba(14,165,233,.05) 0%,transparent 60%);
  }
  header { text-align:center; margin-bottom:18px; animation:fadeUp .8s ease both; }
  header h1 {
    font-family:'DM Serif Display',serif;
    font-size:clamp(1.4rem,4vw,2.2rem);
    letter-spacing:-.02em; line-height:1.2;
  }
  header h1 span { color:var(--accent); }
  .divider { width:60px; height:2px; background:var(--accent); margin:10px auto; border-radius:2px; }
  header p { color:var(--muted); font-size:.8rem; margin-top:6px; font-weight:300; letter-spacing:.06em; text-transform:uppercase; }

  /* STATUS */
  .status-bar {
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; justify-content:center;
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:10px 18px; margin-bottom:14px; font-size:.75rem;
    animation:fadeUp .85s ease .05s both; box-shadow:0 4px 24px rgba(0,0,0,.3);
    max-width:820px; width:100%;
  }
  .live-dot {
    width:9px; height:9px; border-radius:50%; background:var(--green); flex-shrink:0;
    box-shadow:0 0 0 0 rgba(6,214,160,.6); animation:pulse 2s infinite;
  }
  .live-dot.error  { background:var(--red); animation:none; box-shadow:none; }
  .live-dot.spin   { background:var(--accent); animation:pulse 1s infinite; }
  @keyframes pulse {
    0%  { box-shadow:0 0 0 0   rgba(6,214,160,.6); }
    70% { box-shadow:0 0 0 7px rgba(6,214,160,0); }
    100%{ box-shadow:0 0 0 0   rgba(6,214,160,0); }
  }
  .status-text { color:var(--muted); flex:1; min-width:160px; }
  .status-text strong { color:var(--text); }
  .status-time { color:var(--muted); font-size:.68rem; white-space:nowrap; }
  .btn-sm {
    background:transparent; border:1px solid var(--border);
    color:var(--muted); font-size:.7rem; padding:4px 10px; border-radius:6px;
    cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif; white-space:nowrap;
    text-decoration:none; display:inline-block;
  }
  .btn-sm:hover { border-color:var(--accent); color:var(--accent); }

  /* SOURCE BADGE */
  .source-badge {
    background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    padding:8px 16px; margin-bottom:14px; font-size:.7rem; color:var(--muted);
    max-width:820px; width:100%; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    animation:fadeUp .85s ease .08s both;
  }
  .source-badge span { color:var(--accent); font-weight:600; }
  .source-badge a { color:var(--blue); text-decoration:none; }
  .source-badge a:hover { text-decoration:underline; }

  /* CONTROLS */
  .control {
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:13px 20px; margin-bottom:14px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center;
    animation:fadeUp .88s ease .1s both; box-shadow:0 6px 30px rgba(0,0,0,.3);
    max-width:820px; width:100%;
  }
  .control label { font-size:.73rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; white-space:nowrap; }
  .slider-wrap { display:flex; align-items:center; gap:10px; }
  input[type=range] {
    -webkit-appearance:none; appearance:none; width:160px; height:4px; border-radius:2px;
    background:linear-gradient(to right,var(--accent) 0%,var(--accent) var(--pct,33%),rgba(255,255,255,.12) var(--pct,33%),rgba(255,255,255,.12) 100%);
    outline:none; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:17px; height:17px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 0 3px rgba(255,137,6,.25); transition:box-shadow .2s;
  }
  input[type=range]:hover::-webkit-slider-thumb { box-shadow:0 0 0 6px rgba(255,137,6,.18); }
  .count-badge {
    background:var(--accent); color:#0f0e17; font-weight:700; font-size:.9rem;
    width:30px; height:30px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-family:'DM Serif Display',serif; flex-shrink:0;
  }

  /* VOTE INPUTS */
  .inputs-panel {
    width:100%; max-width:820px; background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:16px 20px; margin-bottom:18px;
    animation:fadeUp .9s ease .15s both; box-shadow:0 6px 30px rgba(0,0,0,.3);
  }
  .inputs-panel-title {
    font-size:.69rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em;
    margin-bottom:12px; display:flex; align-items:center; gap:10px;
  }
  .inputs-panel-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .inputs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(195px,1fr)); gap:10px; }
  .vote-input-row { display:flex; flex-direction:column; gap:4px; }
  .vote-input-label {
    font-size:.67rem; color:var(--muted); font-family:'Tiro Devanagari Nepali',serif;
    display:flex; align-items:center; gap:5px; line-height:1.3;
  }
  .vote-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .vote-input-wrap {
    display:flex; align-items:center; background:var(--surface2);
    border:1px solid var(--border); border-radius:7px; overflow:hidden;
    transition:border-color .2s,box-shadow .2s;
  }
  .vote-input-wrap:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px rgba(255,137,6,.14); }
  .vote-input-wrap input[type=number] {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:.8rem; font-weight:500; padding:7px 8px; width:100%; -moz-appearance:textfield;
  }
  .vote-input-wrap input[type=number]::-webkit-outer-spin-button,
  .vote-input-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
  .vote-suffix { font-size:.6rem; color:var(--muted); padding:0 8px; white-space:nowrap; }

  /* LAYOUT */
  .layout {
    display:flex; gap:28px; align-items:flex-start;
    max-width:820px; width:100%; flex-wrap:wrap; justify-content:center;
    animation:fadeUp .9s ease .2s both;
  }
  .chart-container {
    background:var(--surface); border:1px solid var(--border); border-radius:18px;
    padding:24px; flex:0 0 280px; box-shadow:0 20px 70px rgba(0,0,0,.4);
  }
  .legend { flex:1 1 240px; max-height:460px; overflow-y:auto; padding-right:4px; }
  .legend::-webkit-scrollbar { width:4px; }
  .legend::-webkit-scrollbar-track { background:transparent; }
  .legend::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:4px; }
  .legend-item {
    display:flex; align-items:center; gap:10px; padding:8px 11px; border-radius:9px;
    margin-bottom:3px; cursor:pointer; transition:background .2s; border:1px solid transparent;
  }
  .legend-item:hover { background:rgba(255,255,255,.05); border-color:var(--border); }
  .legend-item.active { background:rgba(255,137,6,.08); border-color:rgba(255,137,6,.2); }
  .dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .legend-info { flex:1; min-width:0; }
  .legend-name { font-size:.74rem; color:var(--text); font-weight:500; line-height:1.3; font-family:'Tiro Devanagari Nepali',serif; }
  .legend-rank {
    display:inline-block; font-family:'DM Sans',sans-serif; font-size:.57rem;
    color:#0f0e17; background:var(--accent); border-radius:3px;
    padding:1px 4px; margin-right:4px; font-weight:700; vertical-align:middle;
  }
  .legend-meta { display:flex; gap:10px; margin-top:2px; }
  .legend-votes { font-size:.66rem; color:var(--muted); font-weight:300; }
  .legend-pct { font-size:.66rem; font-weight:600; color:var(--accent); }
  .legend-wins { font-size:.63rem; color:var(--green); font-weight:600; }
  .bar-wrap { width:100%; height:3px; background:rgba(255,255,255,.07); border-radius:2px; margin-top:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:2px; transition:width .5s ease; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @media(max-width:600px){
    .chart-container{flex:0 0 100%;padding:18px;}
    .legend{max-height:300px;}
    input[type=range]{width:110px;}
    .inputs-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<header>
  <h1>नेपाल — <span>दलगत मत वितरण</span></h1>
  <div class="divider"></div>
  <p>प्रतिनिधि सभा निर्वाचन २०८२ · समानुपातिक</p>
</header>

<div class="status-bar">
  <div class="live-dot spin" id="liveDot"></div>
  <span class="status-text" id="statusText"><strong>Loading...</strong> Fetching from OnlineKhabar…</span>
  <span class="status-time" id="statusTime"></span>
  <button class="btn-sm" onclick="fetchLive()">↺ Refresh</button>
  <a href="https://election.onlinekhabar.com/parties" target="_blank" class="btn-sm">↗ Source</a>
</div>

<div class="source-badge">
  📡 <span>Source:</span>
  <a href="https://election.onlinekhabar.com/parties" target="_blank">election.onlinekhabar.com/parties</a>
  &nbsp;·&nbsp; Auto-refreshes every 60s &nbsp;·&nbsp; समानुपातिक (PR) मत
</div>

<div class="control">
  <label>Show Top Parties</label>
  <div class="slider-wrap">
    <span style="font-size:.72rem;color:var(--muted)">1</span>
    <input type="range" id="topSlider" min="1" max="15" value="6" step="1">
    <span style="font-size:.72rem;color:var(--muted)">15</span>
  </div>
  <div class="count-badge" id="countBadge">6</div>
</div>

<div class="inputs-panel">
  <div class="inputs-panel-title">
    Edit / Override Vote Counts
    <button class="btn-sm" id="resetBtn">↺ Reset to Live</button>
  </div>
  <div class="inputs-grid" id="inputsGrid"></div>
</div>

<div class="layout">
  <div class="chart-container">
    <canvas id="pie" width="260" height="260"></canvas>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script>
// ── Seed data (from document + onlinekhabar /parties page) ──────────────────
const SEED = [
  { name:"राष्ट्रिय स्वतन्त्र पार्टी", votes:39425, wins:30 },
  { name:"नेपाली काँग्रेस",             votes:11791, wins:5  },
  { name:"नेकपा (एमाले)",               votes:6304,  wins:2  },
  { name:"राष्ट्रिय प्रजातन्त्र पार्टी",votes:5026,  wins:0  },
  { name:"नेपाली कम्युनिस्ट पार्टी",    votes:2530,  wins:2  },
  { name:"श्रम संस्कृति पार्टी",        votes:1510,  wins:0  },
  { name:"नेपाल मजदुर किसान पार्टी",    votes:606,   wins:0  },
  { name:"नागरिक उन्मुक्ति पार्टी",     votes:66,    wins:0  },
  { name:"जनता समाजवादी पार्टी",        votes:46,    wins:0  },
  { name:"जनमत पार्टी",                 votes:37,    wins:0  },
  { name:"प्रगतिशील लोकतान्त्रिक पार्टी",votes:170,  wins:0  },
  { name:"उज्यालो नेपाल पार्टी",        votes:0,     wins:0  },
  { name:"स्वतन्त्र",                   votes:0,     wins:1  },
  { name:"लोकतान्त्रिक समाजवादी पार्टी",votes:0,     wins:0  },
  { name:"राष्ट्रिय परिवर्तन पार्टी",   votes:0,     wins:0  },
];

const palette = [
  "#ff8906","#3a86ff","#06d6a0","#e53170","#ffd166",
  "#8338ec","#f25f4c","#118ab2","#7b2d8b","#ef476f",
  "#fb5607","#3d9970","#ff006e","#8ecae6","#219ebc"
];

let liveParties  = SEED.map(p=>({...p}));
let parties      = SEED.map(p=>({...p}));
let isOverridden = false;

const slider     = document.getElementById('topSlider');
const badge      = document.getElementById('countBadge');
const legendEl   = document.getElementById('legend');
const inputsGrid = document.getElementById('inputsGrid');
const resetBtn   = document.getElementById('resetBtn');
const liveDot    = document.getElementById('liveDot');
const statusText = document.getElementById('statusText');
const statusTime = document.getElementById('statusTime');
const ctx        = document.getElementById('pie').getContext('2d');

// ── Chart ───────────────────────────────────────────────────────────────────
const chart = new Chart(ctx, {
  type:'doughnut',
  data:{ labels:[], datasets:[{ data:[], backgroundColor:[], borderColor:'#0f0e17', borderWidth:2, hoverBorderWidth:3, hoverOffset:12 }] },
  options:{
    responsive:false, cutout:'60%',
    animation:{ animateRotate:true, duration:600, easing:'easeInOutQuart' },
    plugins:{
      legend:{ display:false },
      tooltip:{
        enabled:true, backgroundColor:'#1a1828', titleColor:'#fffffe',
        bodyColor:'#a7a9be', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, padding:11,
        callbacks:{
          label:function(c){
            const tot = parties.slice(0,+slider.value).reduce((s,d)=>s+d.votes,0);
            const pct = tot>0 ? ((c.parsed/tot)*100).toFixed(2) : '0.00';
            return ` ${c.parsed.toLocaleString()} votes (${pct}%)`;
          }
        }
      }
    }
  }
});

let activeColors=[], centerTimer=null;

function drawCenter(total) {
  const w=ctx.canvas.width, h=ctx.canvas.height;
  ctx.save();
  ctx.font=`bold 14px 'DM Serif Display',serif`;
  ctx.fillStyle='#fffffe'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(total.toLocaleString(), w/2, h/2-9);
  ctx.font=`9px 'DM Sans',sans-serif`; ctx.fillStyle='#a7a9be';
  ctx.fillText('PR VOTES', w/2, h/2+10);
  ctx.restore();
}

// ── Nepali numeral → Arabic ─────────────────────────────────────────────────
function nep2arab(s){
  return String(s).replace(/[०-९]/g,d=>('०१२३४५६७८९'.indexOf(d)));
}

// ── Parse the OnlineKhabar /parties HTML ────────────────────────────────────
function parseOKParties(html) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');
  const result = [];

  // Each party card has structure:
  // <h3 or a>Party Name</h3>
  // ...
  // "समानुपातिक मत" label
  // <h5>votes number</h5>
  // "जित" label
  // <h5>wins</h5>

  // Strategy: find all elements containing "समानुपातिक मत" and grab nearby h5/strong
  const allEls = Array.from(doc.querySelectorAll('*'));

  // Collect party sections — look for anchor/h3/h2 with party links
  // Then scan forward for vote counts
  const cards = doc.querySelectorAll('a[href*="/party/"]');
  const seen  = new Set();

  cards.forEach(card => {
    // Get party name from the link text or nearby heading
    let name = card.textContent.trim();
    if (!name || name.length < 2 || seen.has(name)) return;

    // Only party name links (not full page links with extra text)
    if (name.length > 60 || name.includes('\n')) return;

    // Walk siblings/parent to find vote numbers
    const parent = card.closest('div,li,article,section') || card.parentElement;
    if (!parent) return;

    const text = parent.innerText || parent.textContent || '';

    // Find "समानुपातिक मत" section — votes appear after it
    const prIdx = text.indexOf('समानुपातिक मत');
    const winIdx = text.indexOf('जित');

    let prVotes = 0, wins = 0;

    if (prIdx >= 0) {
      // Extract numbers after "समानुपातिक मत"
      const after = text.slice(prIdx + 14, prIdx + 40);
      const numMatch = after.match(/[\d,०-९]+/);
      if (numMatch) {
        prVotes = parseInt(nep2arab(numMatch[0]).replace(/,/g,'')) || 0;
      }
    }

    if (winIdx >= 0) {
      const after = text.slice(winIdx + 3, winIdx + 15);
      const numMatch = after.match(/[\d०-९]+/);
      if (numMatch) wins = parseInt(nep2arab(numMatch[0])) || 0;
    }

    if (name && !seen.has(name)) {
      seen.add(name);
      result.push({ name, votes: prVotes, wins });
    }
  });

  // Filter out zero-vote parties unless they have wins, sort by votes desc
  return result
    .filter(p => p.votes > 0 || p.wins > 0)
    .sort((a,b) => b.votes - a.votes)
    .slice(0, 15);
}

// ── FETCH via CORS proxies ──────────────────────────────────────────────────
const TARGET = 'https://election.onlinekhabar.com/parties';
const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}&t=${Date.now()}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function tryProxy(fn) {
  const r = await fetch(fn(TARGET), { cache:'no-store' });
  if (!r.ok) throw new Error('HTTP '+r.status);
  let body;
  try { const j=await r.json(); body=j.contents||JSON.stringify(j); }
  catch { body=await r.text(); }
  return body;
}

async function fetchLive() {
  liveDot.className = 'live-dot spin';
  statusText.innerHTML = '<strong>Fetching…</strong> election.onlinekhabar.com/parties';

  let html = null;
  for (const fn of PROXIES) {
    try { html = await tryProxy(fn); if (html) break; }
    catch(e) { console.warn('proxy fail',e.message); }
  }

  if (!html) {
    liveDot.className = 'live-dot error';
    statusText.innerHTML = `<strong style="color:var(--red)">Offline</strong> · All proxies failed — showing last known data`;
    stamp(); return;
  }

  const parsed = parseOKParties(html);

  if (parsed.length >= 3) {
    liveParties = parsed;
    if (!isOverridden) parties = liveParties.map(p=>({...p}));
    liveDot.className = 'live-dot';
    statusText.innerHTML = `<strong style="color:var(--green)">LIVE</strong> · ${parsed.length} parties · election.onlinekhabar.com`;
    // Expand slider max if more parties found
    slider.max = Math.min(parsed.length, 15);
  } else {
    liveDot.className = 'live-dot error';
    statusText.innerHTML = `<strong style="color:var(--accent)">Partial</strong> · Got page but couldn't parse party data — showing seed data`;
  }

  stamp(); render();
}

function stamp() {
  const t=new Date();
  statusTime.textContent=t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ── Build inputs ────────────────────────────────────────────────────────────
function buildInputs() {
  const n=+slider.value; inputsGrid.innerHTML='';
  parties.slice(0,n).forEach((p,i)=>{
    const row=document.createElement('div'); row.className='vote-input-row';
    row.innerHTML=`
      <div class="vote-input-label">
        <span class="vote-dot" style="background:${palette[i]}"></span>${p.name}
      </div>
      <div class="vote-input-wrap">
        <input type="number" min="0" step="1" value="${p.votes}" data-idx="${i}">
        <span class="vote-suffix">PR votes</span>
      </div>`;
    row.querySelector('input').addEventListener('input',function(){
      parties[+this.dataset.idx].votes=parseInt(this.value)||0;
      isOverridden=true; renderChart(); renderLegend();
    });
    inputsGrid.appendChild(row);
  });
}

// ── Chart ───────────────────────────────────────────────────────────────────
function renderChart() {
  const shown=parties.slice(0,+slider.value);
  const total=shown.reduce((s,d)=>s+d.votes,0);
  const colors=shown.map((_,i)=>palette[i]);
  activeColors=colors;
  chart.data.labels=shown.map(d=>d.name);
  chart.data.datasets[0].data=shown.map(d=>d.votes);
  chart.data.datasets[0].backgroundColor=[...colors];
  chart.update();
  if(centerTimer)clearTimeout(centerTimer);
  centerTimer=setTimeout(()=>drawCenter(total),650);
}

// ── Legend ──────────────────────────────────────────────────────────────────
function renderLegend() {
  const shown=parties.slice(0,+slider.value);
  const total=shown.reduce((s,d)=>s+d.votes,0);
  const maxV=Math.max(...shown.map(d=>d.votes),1);
  legendEl.innerHTML='';
  shown.forEach((d,i)=>{
    const pct=total>0?((d.votes/total)*100).toFixed(2):'0.00';
    const barW=((d.votes/maxV)*100).toFixed(1);
    const item=document.createElement('div'); item.className='legend-item';
    item.innerHTML=`
      <div class="dot" style="background:${palette[i]}"></div>
      <div class="legend-info">
        <div class="legend-name"><span class="legend-rank">#${i+1}</span>${d.name}</div>
        <div class="legend-meta">
          <span class="legend-votes">${d.votes.toLocaleString()}</span>
          <span class="legend-pct">${pct}%</span>
          ${d.wins>0?`<span class="legend-wins">✓ ${d.wins} जित</span>`:''}
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${barW}%;background:${palette[i]}"></div></div>
      </div>`;
    item.addEventListener('mouseenter',()=>{
      chart.data.datasets[0].backgroundColor=activeColors.map((c,j)=>j===i?c:c+'44');
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach((el,j)=>el.classList.toggle('active',j===i));
    });
    item.addEventListener('mouseleave',()=>{
      chart.data.datasets[0].backgroundColor=[...activeColors];
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach(el=>el.classList.remove('active'));
    });
    legendEl.appendChild(item);
  });
}

function render() {
  const n=+slider.value; badge.textContent=n;
  slider.style.setProperty('--pct',(((n-1)/14)*100).toFixed(1)+'%');
  buildInputs(); renderChart(); renderLegend();
}

resetBtn.addEventListener('click',()=>{
  isOverridden=false;
  parties=liveParties.map(p=>({...p}));
  render();
});
slider.addEventListener('input', render);

// Init with seed, then fetch live
render();
fetchLive();
setInterval(fetchLive, 60000);
</script>
</body>
</html>
