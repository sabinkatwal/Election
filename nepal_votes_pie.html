<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Party Vote Distribution</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Nepali&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #211e32;
    --border: rgba(255,255,255,0.07);
    --text: #fffffe;
    --muted: #a7a9be;
    --accent: #ff8906;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(255,137,6,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(14,165,233,0.05) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease both;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 8px;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .divider { width: 60px; height: 2px; background: var(--accent); margin: 14px auto; border-radius: 2px; }

  /* ── SLIDER CONTROL ── */
  .control {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.85s ease 0.1s both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  .control label {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .slider-wrap { display: flex; align-items: center; gap: 12px; }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 180px;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,33%), rgba(255,255,255,0.12) var(--pct,33%), rgba(255,255,255,0.12) 100%);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,137,6,0.25);
    transition: box-shadow 0.2s;
  }

  input[type=range]:hover::-webkit-slider-thumb { box-shadow: 0 0 0 6px rgba(255,137,6,0.2); }

  .count-badge {
    background: var(--accent);
    color: #0f0e17;
    font-weight: 700;
    font-size: 1rem;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    flex-shrink: 0;
  }

  /* ── VOTE INPUTS PANEL ── */
  .inputs-panel {
    width: 100%;
    max-width: 820px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 28px;
    animation: fadeUp 0.9s ease 0.15s both;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  .inputs-panel-title {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .inputs-panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .inputs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .vote-input-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .vote-input-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'Tiro Devanagari Nepali', serif;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.3;
  }

  .vote-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .vote-input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .vote-input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255,137,6,0.15);
  }

  .vote-input-wrap input[type=number] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 8px 10px;
    width: 100%;
    -moz-appearance: textfield;
  }

  .vote-input-wrap input[type=number]::-webkit-outer-spin-button,
  .vote-input-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .vote-suffix {
    font-size: 0.65rem;
    color: var(--muted);
    padding: 0 10px;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: flex;
    gap: 36px;
    align-items: flex-start;
    max-width: 900px;
    width: 100%;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.9s ease 0.2s both;
  }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    flex: 0 0 320px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
  }

  .legend {
    flex: 1 1 260px;
    max-height: 480px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .legend::-webkit-scrollbar { width: 4px; }
  .legend::-webkit-scrollbar-track { background: transparent; }
  .legend::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1px solid transparent;
  }

  .legend-item:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
  .legend-item.active { background: rgba(255,137,6,0.08); border-color: rgba(255,137,6,0.2); }

  .dot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

  .legend-info { flex: 1; min-width: 0; }

  .legend-name {
    font-size: 0.78rem;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
    font-family: 'Tiro Devanagari Nepali', serif;
  }

  .legend-rank {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.6rem;
    color: #0f0e17;
    background: var(--accent);
    border-radius: 3px;
    padding: 1px 5px;
    margin-right: 5px;
    font-weight: 700;
    vertical-align: middle;
  }

  .legend-meta { display: flex; gap: 10px; margin-top: 2px; }
  .legend-votes { font-size: 0.7rem; color: var(--muted); font-weight: 300; }
  .legend-pct   { font-size: 0.7rem; font-weight: 600; color: var(--accent); }

  .bar-wrap { width: 100%; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .chart-container { flex: 0 0 100%; padding: 18px; }
    .legend { max-height: 320px; }
    input[type=range] { width: 120px; }
    .inputs-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>नेपाल — <span>दलगत मत वितरण</span></h1>
  <div class="divider"></div>
  <p>Party-wise Vote Share Distribution</p>
</header>

<!-- Slider -->
<div class="control">
  <label>Show Top Parties</label>
  <div class="slider-wrap">
    <span style="font-size:0.76rem;color:var(--muted)">1</span>
    <input type="range" id="topSlider" min="1" max="15" value="6" step="1">
    <span style="font-size:0.76rem;color:var(--muted)">15</span>
  </div>
  <div class="count-badge" id="countBadge">6</div>
</div>

<!-- Vote Inputs Panel -->
<div class="inputs-panel">
  <div class="inputs-panel-title">
    Edit Vote Counts
    <button class="reset-btn" id="resetBtn">↺ Reset</button>
  </div>
  <div class="inputs-grid" id="inputsGrid"></div>
</div>

<!-- Chart + Legend -->
<div class="layout">
  <div class="chart-container">
    <canvas id="pie" width="300" height="300"></canvas>
  </div>
  <div class="legend" id="legend"></div>
</div>

<script>
const defaultParties = [
  { name: "राष्ट्रिय स्वतन्त्र पार्टी", votes: 341287 },
  { name: "नेपाली काँग्रेस",             votes: 104149 },
  { name: "नेकपा (एमाले)",               votes: 84330  },
  { name: "नेपाली कम्युनिष्ट पार्टी",    votes: 37707  },
  { name: "राष्ट्रिय प्रजातन्त्र पार्टी",votes: 26715  },
  { name: "श्रम संस्कृति पार्टी",        votes: 12805  },
  { name: "राष्ट्रिय परिवर्तन पार्टी",   votes: 8763   },
  { name: "नेपाल मजदुर किसान पार्टी",    votes: 2699   },
  { name: "जनता समाजवादी पार्टी",        votes: 2456   },
  { name: "नेकपा (माओवादी)",             votes: 2337   },
  { name: "राष्ट्र निर्माण दल नेपाल",   votes: 2056   },
  { name: "जनमत पार्टी",                 votes: 1815   },
  { name: "एकल चिन्ह चकिया",             votes: 1750   },
  { name: "नेपाल जनता संरक्षण पार्टी",  votes: 1328   },
  { name: "प्रगतिशील लोकतान्त्रिक पार्टी", votes: 1235 },
];

// Working copy – editable
const parties = defaultParties.map(p => ({ ...p }));

const palette = [
  "#ff8906","#3a86ff","#06d6a0","#e53170","#ffd166",
  "#8338ec","#f25f4c","#118ab2","#7b2d8b","#ef476f",
  "#fb5607","#3d9970","#ff006e","#8ecae6","#219ebc"
];

const slider     = document.getElementById('topSlider');
const badge      = document.getElementById('countBadge');
const legendEl   = document.getElementById('legend');
const inputsGrid = document.getElementById('inputsGrid');
const resetBtn   = document.getElementById('resetBtn');
const ctx        = document.getElementById('pie').getContext('2d');

// ── Chart ──────────────────────────────────────────────
const chart = new Chart(ctx, {
  type: 'doughnut',
  data: {
    labels: [],
    datasets: [{
      data: [],
      backgroundColor: [],
      borderColor: '#0f0e17',
      borderWidth: 2,
      hoverBorderWidth: 3,
      hoverOffset: 14
    }]
  },
  options: {
    responsive: false,
    cutout: '60%',
    animation: { animateRotate: true, duration: 600, easing: 'easeInOutQuart' },
    plugins: {
      legend: { display: false },
      tooltip: {
        enabled: true,
        backgroundColor: '#1a1828',
        titleColor: '#fffffe',
        bodyColor: '#a7a9be',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        padding: 12,
        callbacks: {
          label: function(c) {
            const n = +slider.value;
            const tot = parties.slice(0,n).reduce((s,d)=>s+d.votes,0);
            const pct = ((c.parsed/tot)*100).toFixed(2);
            return ` ${c.parsed.toLocaleString()} votes (${pct}%)`;
          }
        }
      }
    }
  }
});

let activeColors = [];
let centerTimer  = null;

function drawCenter(total) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  ctx.save();
  ctx.font = `bold 16px 'DM Serif Display', serif`;
  ctx.fillStyle = '#fffffe';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total.toLocaleString(), w/2, h/2 - 10);
  ctx.font = `9px 'DM Sans', sans-serif`;
  ctx.fillStyle = '#a7a9be';
  ctx.fillText('TOTAL VOTES', w/2, h/2 + 11);
  ctx.restore();
}

// ── Build input fields ─────────────────────────────────
function buildInputs() {
  const n = +slider.value;
  inputsGrid.innerHTML = '';

  parties.slice(0, n).forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'vote-input-row';
    row.innerHTML = `
      <div class="vote-input-label">
        <span class="vote-dot" style="background:${palette[i]}"></span>
        ${p.name}
      </div>
      <div class="vote-input-wrap">
        <input type="number" min="0" step="1" value="${p.votes}" data-idx="${i}" id="vi_${i}">
        <span class="vote-suffix">votes</span>
      </div>`;
    inputsGrid.appendChild(row);

    row.querySelector('input').addEventListener('input', function() {
      const val = parseInt(this.value) || 0;
      parties[+this.dataset.idx].votes = val;
      renderChart();
      renderLegend();
    });
  });
}

// ── Render chart data ──────────────────────────────────
function renderChart() {
  const n = +slider.value;
  const shown  = parties.slice(0, n);
  const total  = shown.reduce((s,d) => s + d.votes, 0);
  const colors = shown.map((_,i) => palette[i]);
  activeColors = colors;

  chart.data.labels = shown.map(d => d.name);
  chart.data.datasets[0].data = shown.map(d => d.votes);
  chart.data.datasets[0].backgroundColor = [...colors];
  chart.update();

  if (centerTimer) clearTimeout(centerTimer);
  centerTimer = setTimeout(() => drawCenter(total), 650);
}

// ── Render legend ──────────────────────────────────────
function renderLegend() {
  const n = +slider.value;
  const shown = parties.slice(0, n);
  const total = shown.reduce((s,d) => s + d.votes, 0);
  const maxV  = Math.max(...shown.map(d=>d.votes), 1);

  legendEl.innerHTML = '';
  shown.forEach((d, i) => {
    const pct  = total > 0 ? ((d.votes/total)*100).toFixed(2) : '0.00';
    const barW = ((d.votes/maxV)*100).toFixed(1);

    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="dot" style="background:${palette[i]}"></div>
      <div class="legend-info">
        <div class="legend-name"><span class="legend-rank">#${i+1}</span>${d.name}</div>
        <div class="legend-meta">
          <span class="legend-votes">${d.votes.toLocaleString()}</span>
          <span class="legend-pct">${pct}%</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${barW}%;background:${palette[i]}"></div></div>
      </div>`;

    item.addEventListener('mouseenter', () => {
      chart.data.datasets[0].backgroundColor = activeColors.map((c,j) => j===i ? c : c+'44');
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach((el,j) => el.classList.toggle('active', j===i));
    });
    item.addEventListener('mouseleave', () => {
      chart.data.datasets[0].backgroundColor = [...activeColors];
      chart.update('none');
      legendEl.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
    });

    legendEl.appendChild(item);
  });
}

// ── Full render ────────────────────────────────────────
function render() {
  const n = +slider.value;
  badge.textContent = n;

  const fpct = (((n-1)/14)*100).toFixed(1);
  slider.style.setProperty('--pct', fpct + '%');

  buildInputs();
  renderChart();
  renderLegend();
}

// ── Reset ──────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  defaultParties.forEach((p,i) => { parties[i].votes = p.votes; });
  render();
});

slider.addEventListener('input', render);

// Init
render();
</script>
</body>
</html>
